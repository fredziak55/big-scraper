services:
  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - app-network

  app:
    image: node:22-alpine
    container_name: big-scraper
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PGHOST=postgres
      - PGUSER=scraper
      - PGPASSWORD=scraper
      - PGDATABASE=bigscraper
    command: sh -c "npm install && node src/index.js"
    depends_on:
      - postgres
      - redis
    networks:
      - app-network
    restart: unless-stopped
  worker:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - PGHOST=postgres
      - PGUSER=scraper
      - PGPASSWORD=scraper
      - PGDATABASE=bigscraper
    command: sh -c "[ -d node_modules/express ] || npm install && node src/queue/worker/worker.js"
    depends_on:
      - postgres
      - redis
    networks:
      - app-network
    restart: unless-stopped
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: scraper
      POSTGRES_DB: bigscraper
    volumes:
      - pg_data:/var/lib/postgresql/data
    networks:
      - app-network
    restart: unless-stopped

volumes:
  redis_data:
  node_modules:
  pg_data:

networks:
  app-network:
    driver: bridge
