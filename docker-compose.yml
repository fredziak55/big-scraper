services:
  redis:
    image: redis:alpine
    container_name: redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - app-network

  app:
    image: node:22-alpine
    container_name: big-scraper
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - db_data:/app/db
    ports:
      - "3001:3000"
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: sh -c "npm install && node src/index.js"
    depends_on:
      - redis
    networks:
      - app-network
  worker:
    image: node:22-alpine
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
      - db_data:/app/db
    env_file:
      - .env
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    command: sh -c "[ -d node_modules/express ] || npm install && node src/queue/worker/worker.js"
    depends_on:
      - redis
    networks:
      - app-network

volumes:
  redis_data:
  node_modules:
  db_data:

networks:
  app-network:
    driver: bridge
