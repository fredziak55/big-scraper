<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Intercooler DB</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0b0d14;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    /* animated background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.18;
      animation: drift 12s ease-in-out infinite alternate;
      pointer-events: none;
    }
    .blob-1 { width: 500px; height: 500px; background: #f97316; top: -150px; left: -150px; animation-duration: 14s; }
    .blob-2 { width: 400px; height: 400px; background: #ef4444; bottom: -100px; right: -100px; animation-duration: 10s; }
    .blob-3 { width: 300px; height: 300px; background: #fb923c; top: 40%; left: 50%; animation-duration: 16s; }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    .hero {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem 1.5rem;
      max-width: 620px;
      animation: fadeUp 0.7s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .icon {
      font-size: 4rem;
      line-height: 1;
      margin-bottom: 1.2rem;
      display: block;
      animation: pulse 2.5s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }

    h1 {
      font-size: clamp(2rem, 5vw, 3rem);
      font-weight: 800;
      background: linear-gradient(135deg, #f97316 30%, #ef4444);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -1px;
      line-height: 1.15;
      margin-bottom: 1rem;
    }

    p.subtitle {
      color: #94a3b8;
      font-size: 1.05rem;
      line-height: 1.7;
      margin-bottom: 2.2rem;
    }

    .cta {
      display: inline-flex;
      align-items: center;
      gap: 0.6rem;
      background: linear-gradient(135deg, #f97316, #ef4444);
      color: #fff;
      font-weight: 700;
      font-size: 1rem;
      text-decoration: none;
      padding: 0.85rem 2rem;
      border-radius: 999px;
      box-shadow: 0 8px 30px rgba(249, 115, 22, 0.35);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .cta:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow: 0 14px 40px rgba(249, 115, 22, 0.5);
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 2rem;
      margin-top: 3rem;
      flex-wrap: wrap;
    }

    .stat {
      text-align: center;
      animation: fadeUp 0.7s ease both;
    }
    .stat:nth-child(2) { animation-delay: 0.1s; }
    .stat:nth-child(3) { animation-delay: 0.2s; }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 800;
      color: #f97316;
    }

    .stat-label {
      font-size: 0.75rem;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 2px;
    }
  </style>
</head>
<body>

  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="hero">
    <span class="icon">🔧</span>
    <h1>Intercooler Database</h1>
    <p class="subtitle">
      Browse, compare, and explore car intercoolers.<br>
      All data in one place — fast, searchable, up to date.
    </p>
    <a class="cta" href="/showall.html">
      View All Intercoolers →
    </a>

    <div class="stats">
      <div class="stat">
        <div class="stat-value" id="count">—</div>
        <div class="stat-label">Intercoolers</div>
      </div>
      <div class="stat">
        <div class="stat-value">cm³</div>
        <div class="stat-label">Capacity tracked</div>
      </div>
      <div class="stat">
        <div class="stat-value">$</div>
        <div class="stat-label">Prices included</div>
      </div>
    </div>
  </div>

  <script>
    // Live count from API
    fetch('/intercoolers')
      .then(r => r.json())
      .then(rows => {
        document.getElementById('count').textContent = rows.length
      })
      .catch(() => {})
  </script>

</body>
</html>
